<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thống kê án tòa</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--blue:#1b4f72;--accent:#e8a83e;--accent2:#2ecc9e;--surface:#f4f6fb;--card:#fff;--border:#dde3ef;--text:#1a2332;--muted:#7a8ba3;--danger:#e74c3c;--success:#27ae60}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:22px 32px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 18px rgba(13,27,42,.2)}
header h1{font-family:'Playfair Display',serif;font-size:1.45rem}
header p{font-size:.78rem;color:rgba(255,255,255,.58);margin-top:3px}
.container{max-width:1100px;margin:0 auto;padding:26px 14px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px 26px;margin-bottom:18px;box-shadow:0 2px 10px rgba(13,27,42,.05)}
.sec-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';display:inline-block;width:4px;height:14px;background:var(--accent);border-radius:2px}
.form-row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.78rem;font-weight:600;color:var(--blue)}
.fg input[type=date]{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.88rem;font-family:inherit;background:var(--surface);color:var(--text);outline:none;min-width:150px;transition:border-color .2s}
.fg input:focus{border-color:var(--blue);background:#fff}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.chip{padding:6px 13px;border-radius:18px;border:2px solid var(--border);background:var(--surface);font-size:.78rem;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.sht{padding:7px 15px;border-radius:18px;border:2px solid var(--border);background:var(--surface);font-size:.8rem;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text)}
.sht.ds{background:var(--blue);border-color:var(--blue);color:#fff}
.sht.hs{background:var(--accent);border-color:var(--accent);color:var(--navy)}
.sht.hc{background:var(--accent2);border-color:var(--accent2);color:var(--navy)}
.run-btn{margin-top:18px;padding:11px 28px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;border-radius:10px;font-size:.9rem;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(27,79,114,.25)}
.run-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(27,79,114,.35)}
.run-btn:disabled{opacity:.5;transform:none;cursor:not-allowed}
.sb{display:flex;align-items:center;gap:9px;padding:10px 15px;border-radius:9px;font-size:.82rem;font-weight:500;margin-bottom:16px}
.sb.loading{background:#e8f4ff;color:var(--blue)}
.sb.error{background:#fff0f0;color:var(--danger)}
.sb.ok{background:#eafff5;color:var(--success)}
.spin{width:14px;height:14px;border:2px solid rgba(27,79,114,.2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:13px}
.sbox{background:var(--card);border-radius:12px;padding:18px 16px;border:1.5px solid var(--border);text-align:center;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.sbox::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.sbox.cu::before{background:var(--accent)}.sbox.moi::before{background:#3498db}.sbox.gq::before{background:var(--success)}.sbox.ton::before{background:var(--danger)}
.sbox:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(13,27,42,.09)}
.slabel{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px}
.sval{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:700;color:var(--navy)}
table.dt{width:100%;border-collapse:collapse;font-size:.85rem}
table.dt th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:.77rem;font-weight:600}
table.dt th:first-child{border-radius:9px 0 0 0}table.dt th:last-child{border-radius:0 9px 0 0}
table.dt td{padding:9px 12px;border-bottom:1px solid var(--border)}
table.dt tr:hover td{background:var(--surface)}
table.dt .r{text-align:right;font-weight:600}
table.dt .trow td{background:#f0f4fa;font-weight:700}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.7rem;font-weight:600}
.tds{background:#eaf3ff;color:#1b4f72}.ths{background:#fff5e0;color:#b7600a}.thc{background:#eafff7;color:#1a7a5a}
#results{display:none}
</style>
</head>
<body>
<header>
  <div style="font-size:2rem">⚖️</div>
  <div>
    <h1>Thống kê dữ liệu án tòa</h1>
    <p>Dân sự mở rộng • Hình sự • Xử lý hành chính</p>
  </div>
</header>
<div class="container">
  <div class="card">
    <div class="sec-title">Khoảng thời gian</div>
    <div class="form-row">
      <div class="fg"><label>Từ ngày (X)</label><input type="date" id="df"></div>
      <div class="fg"><label>Đến ngày (Y)</label><input type="date" id="dt"></div>
    </div>

    <div class="sec-title" style="margin-top:20px;margin-bottom:10px">Nhóm án – sheet Dân sự mở rộng</div>
    <div class="chips" id="grpChips">
      <button class="chip on" data-g="all">Tất cả</button>
      <button class="chip" data-g="ds">Dân sự + Việc dân sự</button>
      <button class="chip" data-g="hngd">HNGĐ + Việc HNGĐ</button>
      <button class="chip" data-g="hc">Hành chính</button>
      <button class="chip" data-g="ld">Lao động</button>
      <button class="chip" data-g="kdtm">KDTM</button>
    </div>

    <div class="sec-title" style="margin-top:20px;margin-bottom:10px">Nguồn dữ liệu</div>
    <div class="chips" id="sheetChips">
      <button class="sht ds" data-s="DS">📋 Dân sự mở rộng</button>
      <button class="sht hs" data-s="HS">⚖️ Hình sự</button>
      <button class="sht hc" data-s="XLHC">📜 Xử lý hành chính</button>
    </div>

    <button class="run-btn" id="runBtn" onclick="run()">🔍 Thống kê số liệu</button>
  </div>

  <div id="sb" style="display:none"></div>
  <div id="results">
    <div class="card"><div class="sec-title">Tổng hợp</div><div class="sgrid" id="tStats"></div></div>
    <div class="card"><div class="sec-title">Chi tiết theo nguồn</div><div id="detail"></div></div>
  </div>
</div>

<script>
// ── cấu hình ──────────────────────────────────────────────────────────
const SID = '1FEQRl3QJT6ZlVzptuos9oiXg2yq0LctKHU_NqtY67hU';
// GID lấy từ URL khi click vào tab của từng sheet
const GID = {
  DS  : '209489684',
  HS  : '769340951',   // ← cập nhật đúng gid sheet DATA_HS
  XLHC: '1634544561'    // ← cập nhật đúng gid sheet DATA_XLHC
};

// ── state ─────────────────────────────────────────────────────────────
let selGroup = 'all';
const selSheets = {DS:true, HS:true, XLHC:true};

// group chips
document.querySelectorAll('#grpChips .chip').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('#grpChips .chip').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); selGroup=b.dataset.g;
  };
});
// sheet chips
document.querySelectorAll('#sheetChips .sht').forEach(b=>{
  b.onclick=()=>{
    const s=b.dataset.s;
    selSheets[s]=!selSheets[s];
    const cls={DS:'ds',HS:'hs',XLHC:'hc'}[s];
    selSheets[s]?b.classList.add(cls):b.classList.remove(cls);
  };
});

// ── status ────────────────────────────────────────────────────────────
function st(type,msg){
  const el=document.getElementById('sb');
  el.style.display='flex'; el.className='sb '+type;
  el.innerHTML=(type==='loading'?'<div class="spin"></div>':type==='error'?'<b>❌</b>':'<b>✅</b>')+' '+msg;
}

// ── ngày ──────────────────────────────────────────────────────────────
function pd(v){
  if(!v||!v.trim())return null;
  // dd/mm/yyyy hoặc dd-mm-yyyy
  const m=v.trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(v.trim());
  return isNaN(d.getTime())?null:d;
}
function mn(d){
  if(!d)return null;
  return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}
function inR(d,X,Y){return d&&d>=X&&d<=Y;}

// ── fetch JSON (không cần API key, không CORS) ────────────────────────
// Google Visualization Query API – public sheets, không cần key
function sheetUrl(gid){
  return 'https://docs.google.com/spreadsheets/d/'+SID
    +'/gviz/tq?tqx=out:json&gid='+gid;
}

async function fetchSheet(name){
  const url=sheetUrl(GID[name]);
  const res=await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status+' khi tải sheet '+name);
  const txt=await res.text();
  // response: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  const json=txt.slice(txt.indexOf('{'),txt.lastIndexOf('}')+1);
  const obj=JSON.parse(json);
  if(!obj.table||!obj.table.rows) return [];
  const rows=obj.table.rows;
  // chuyển sang mảng string giống CSV rows
  return rows.map(row=>
    (row.c||[]).map(cell=>{
      if(!cell||cell.v==null)return '';
      // ngày Google trả về kiểu Date(yyyy,mm,dd) hoặc string
      if(typeof cell.v==='string') return cell.v;
      if(cell.f) return cell.f; // formatted value (dd/mm/yyyy)
      return String(cell.v);
    })
  );
}

// ── helpers ───────────────────────────────────────────────────────────
const HGDT=/hòa giải đối thoại|hgđt/i;
const SKIP=['tạm đình chỉ','chuyển thẩm quyền'];
function isSkip(g){return SKIP.includes((g||'').trim().toLowerCase());}

const GMATCH={
  ds  : v=>/dân sự/i.test(v),
  hngd: v=>/hngđ|hn&gđ|hôn nhân/i.test(v),
  hc  : v=>/hành chính/i.test(v),
  ld  : v=>/lao động/i.test(v),
  kdtm: v=>/kdtm|kinh doanh/i.test(v),
};

// ── xử lý sheet ───────────────────────────────────────────────────────
function procDS(rows,X,Y,grp){
  let cu=0,moi=0,gq=0;
  for(const r of rows){
    const I=(r[8]||'').trim();
    if(HGDT.test(I))continue;
    if(grp!=='all'){const fn=GMATCH[grp];if(!fn||!fn(I))continue;}
    const B=mn(pd(r[1])), F=mn(pd(r[5])), sk=isSkip(r[6]);
    if(B&&inR(B,X,Y))moi++;
    if(B&&B<X&&!sk&&(!F||inR(F,X,Y)))cu++;
    if(!sk&&F&&inR(F,X,Y))gq++;
  }
  return{cu,moi,gq,ton:cu+moi-gq};
}
function procHS(rows,X,Y){
  let cu=0,moi=0,gq=0;
  for(const r of rows){
    const B=mn(pd(r[1])),F=mn(pd(r[5])),sk=isSkip(r[6]);
    if(B&&inR(B,X,Y))moi++;
    if(B&&B<X&&!sk&&(!F||inR(F,X,Y)))cu++;
    if(!sk&&F&&inR(F,X,Y))gq++;
  }
  return{cu,moi,gq,ton:cu+moi-gq};
}
function procXLHC(rows,X,Y){
  let cu=0,moi=0,gq=0;
  for(const r of rows){
    const B=mn(pd(r[1])),G=mn(pd(r[6]));
    if(B&&inR(B,X,Y))moi++;
    if(B&&B<X&&(!G||inR(G,X,Y)))cu++;
    if(G&&inR(G,X,Y))gq++;
  }
  return{cu,moi,gq,ton:cu+moi-gq};
}

// ── main ──────────────────────────────────────────────────────────────
async function run(){
  const fv=document.getElementById('df').value;
  const tv=document.getElementById('dt').value;
  if(!fv||!tv){st('error','Chọn đủ khoảng thời gian.');return;}
  const X=mn(new Date(fv)), Y=mn(new Date(tv));
  if(X>Y){st('error','Ngày bắt đầu phải trước ngày kết thúc.');return;}
  const sheets=['DS','HS','XLHC'].filter(k=>selSheets[k]);
  if(!sheets.length){st('error','Chọn ít nhất 1 nguồn dữ liệu.');return;}

  const btn=document.getElementById('runBtn');
  btn.disabled=true;
  document.getElementById('results').style.display='none';

  const res={};
  try{
    for(const s of sheets){
      st('loading','Đang tải sheet '+s+'...');
      const rows=await fetchSheet(s);
      st('loading','Đang xử lý '+rows.length+' dòng sheet '+s+'...');
      if(s==='DS')  res.DS  =procDS(rows,X,Y,selGroup);
      if(s==='HS')  res.HS  =procHS(rows,X,Y);
      if(s==='XLHC')res.XLHC=procXLHC(rows,X,Y);
    }
  }catch(e){st('error',e.message);btn.disabled=false;return;}

  let T={cu:0,moi:0,gq:0,ton:0};
  Object.values(res).forEach(r=>{T.cu+=r.cu;T.moi+=r.moi;T.gq+=r.gq;T.ton+=r.ton;});

  document.getElementById('tStats').innerHTML=
    box('cu','Thụ lý cũ còn lại',T.cu)+
    box('moi','Thụ lý mới',T.moi)+
    box('gq','Đã giải quyết',T.gq)+
    box('ton','Còn tồn',T.ton);

  const NM={DS:'Dân sự mở rộng',HS:'Hình sự',XLHC:'Xử lý hành chính'};
  const TC={DS:'tds',HS:'ths',XLHC:'thc'};
  let tb='';
  Object.entries(res).forEach(([k,v])=>{
    tb+='<tr><td><span class="tag '+TC[k]+'">'+NM[k]+'</span></td>'
      +'<td class="r">'+v.cu+'</td><td class="r">'+v.moi+'</td>'
      +'<td class="r">'+v.gq+'</td><td class="r" style="color:var(--danger)">'+v.ton+'</td></tr>';
  });
  tb+='<tr class="trow"><td>Tổng cộng</td>'
    +'<td class="r">'+T.cu+'</td><td class="r">'+T.moi+'</td>'
    +'<td class="r">'+T.gq+'</td><td class="r" style="color:var(--danger)">'+T.ton+'</td></tr>';

  const gl=document.querySelector('#grpChips .chip.on')?.textContent||'';
  document.getElementById('detail').innerHTML=
    '<p style="font-size:.78rem;color:var(--muted);margin-bottom:12px">📅 Từ <b>'+fv+'</b> đến <b>'+tv+'</b>'
    +(selGroup!=='all'?' &nbsp;|&nbsp; 📂 <b>'+gl+'</b>':'')+'</p>'
    +'<div style="overflow-x:auto"><table class="dt"><thead><tr>'
    +'<th>Nguồn</th><th style="text-align:right">TL cũ còn lại</th><th style="text-align:right">TL mới</th>'
    +'<th style="text-align:right">Giải quyết</th><th style="text-align:right">Còn tồn</th>'
    +'</tr></thead><tbody>'+tb+'</tbody></table></div>';

  document.getElementById('results').style.display='block';
  st('ok','Thống kê xong '+sheets.length+' sheet — tổng '+rows_count(res)+' bản ghi xử lý.');
  btn.disabled=false;
}

function box(cls,label,val){
  return '<div class="sbox '+cls+'"><div class="slabel">'+label+'</div><div class="sval">'+val.toLocaleString('vi-VN')+'</div></div>';
}
function rows_count(res){
  return Object.values(res).reduce((s,r)=>s+r.cu+r.moi,0);
}

// defaults
const now=new Date();
document.getElementById('df').value=now.getFullYear()+'-01-01';
document.getElementById('dt').value=now.getFullYear()+'-12-31';
</script>
</body>
</html>
